name: Weekly WTR/TTR Report

on:
  workflow_dispatch:
  schedule:
    # Every Sunday at 6 PM UTC (18:00)
    - cron: '0 18 * * 0'

jobs:
  generate-report:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    env:
      TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
      TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install yfinance requests

      - name: Generate report
        run: |
          python backend/report_generator.py

      - name: Prepare Pages artifact
        run: |
          mkdir -p pages
          cp docs/report.html pages/index.html

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: pages

      - name: Notify Telegram (optional)
        if: ${{ env.TELEGRAM_BOT_TOKEN != '' && env.TELEGRAM_CHAT_ID != '' }}
        run: |
          WTR=$(python -c "
          import json
          from pathlib import Path
          try:
              with open('data/wtr_history.json') as f:
                  data = json.load(f)
                  monday = data.get('Monday', 'N/A')
                  print(f'Monday: {monday}%')
          except:
              print('N/A')
          " 2>/dev/null || echo "N/A")
          DATE=$(date -u '+%Y-%m-%d %H:%M UTC')
          MSG="$(printf 'SPX WTR/TTR Weekly Report\n%s\n%s\nhttps://xrichini.github.io/alphacrunching/' "$DATE" "$WTR")"
          curl -s -X POST "https://api.telegram.org/bot${TELEGRAM_BOT_TOKEN}/sendMessage" \
            -d chat_id="${TELEGRAM_CHAT_ID}" \
            -d parse_mode="Markdown" \
            --data-urlencode "text=${MSG}"

  deploy-pages:
    runs-on: ubuntu-latest
    needs: generate-report
    permissions:
      pages: write
      id-token: write
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
