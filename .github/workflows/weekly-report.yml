name: Weekly WTR/TTR Report

on:
  schedule:
    # Every Sunday at 6 PM UTC (18:00)
    - cron: '0 18 * * 0'
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

jobs:
  generate-report:
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      
      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.11'
      
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install yfinance requests
      
      - name: Generate report
        run: |
          python backend/report_generator.py
      
      - name: Prepare Pages artifact
        run: |
          mkdir -p pages
          cp docs/report.html pages/index.html
      
      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: pages
      
      - name: Send to Telegram
        if: ${{ secrets.TELEGRAM_BOT_TOKEN != '' && secrets.TELEGRAM_CHAT_ID != '' }}
        env:
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
        run: |
          python << 'EOF'
          import requests
          from pathlib import Path
          import json
          import os
          
          bot_token = os.environ.get("TELEGRAM_BOT_TOKEN", "")
          chat_id = os.environ.get("TELEGRAM_CHAT_ID", "")
          
          if not bot_token or not chat_id:
              print("⚠️  Telegram secrets not configured")
              exit(0)
          
          # Read metrics to create message
          data_dir = Path("data")
          try:
              with open(data_dir / "wtr_history.json") as f:
                  wtr = json.load(f)
              with open(data_dir / "ttr_history.json") as f:
                  ttr = json.load(f)
          except:
              wtr = {}
              ttr = {}
          
          # Build message
          days = ["Monday", "Tuesday", "Wednesday", "Thursday", "Friday"]
          wtr_text = "\n".join(["  {}: {}%".format(day, wtr.get(day, 'N/A')) for day in days])
          ttr_text = "\n".join(["  {}: {}%".format(day, ttr.get(day, 'N/A')) for day in days])
          
          message = """📊 *SPX WTR/TTR Weekly Report*

📈 *Weekly Triumph Rate (WTR)*
{}

⏭️ *Tomorrow's Triumph Rate (TTR)*
{}

📊 *Full Report*:
https://xrichini.github.io/alphacrunching/""".format(wtr_text, ttr_text)
          
          # Send Telegram message
          url = "https://api.telegram.org/bot{}/sendMessage".format(bot_token)
          payload = {
              "chat_id": chat_id,
              "text": message,
              "parse_mode": "Markdown"
          }
          
          response = requests.post(url, json=payload)
          if response.status_code == 200:
              print("✅ Message sent to Telegram")
          else:
              print("❌ Failed to send message: {}".format(response.status_code))
          EOF

  deploy-pages:
    runs-on: ubuntu-latest
    needs: generate-report
    permissions:
      pages: write
      id-token: write
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
