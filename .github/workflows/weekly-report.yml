name: Weekly WTR/TTR Report

on:
  workflow_dispatch:
  schedule:
    # Every Sunday at 6 PM UTC (18:00)
    - cron: '0 18 * * 0'

jobs:
  generate-report:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    env:
      TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
      TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install yfinance requests matplotlib

      - name: Generate report
        run: |
          python backend/report_generator.py

      - name: Commit updated data files
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data/wtr_weekly_history.json data/ttr_weekly_history.json data/wtr_history.json data/ttr_history.json
          git diff --staged --quiet || git commit -m "chore: update weekly WTR/TTR history [skip ci]"
          git push

      - name: Prepare Pages artifact
        run: |
          mkdir -p pages
          cp docs/report.html pages/index.html

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: pages

      - name: Notify Telegram with chart
        if: ${{ env.TELEGRAM_BOT_TOKEN != '' && env.TELEGRAM_CHAT_ID != '' }}
        env:
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
        run: |
          DATE=$(date -u '+%Y-%m-%d %H:%M UTC')
          CAPTION="SPX WTR/TTR Weekly Report — ${DATE}
          https://xrichini.github.io/alphacrunching/"
          curl -s -X POST "https://api.telegram.org/bot${TELEGRAM_BOT_TOKEN}/sendPhoto" \
            -F chat_id="${TELEGRAM_CHAT_ID}" \
            -F photo="@docs/spx_weekly_chart.png" \
            --data-urlencode "caption=${CAPTION}"

  deploy-pages:
    runs-on: ubuntu-latest
    needs: generate-report
    permissions:
      pages: write
      id-token: write
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4