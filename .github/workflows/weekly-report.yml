name: Weekly WTR/TTR Report

on:
  schedule:
    # Every Sunday at 6 PM UTC (18:00)
    - cron: '0 18 * * 0'
  workflow_dispatch:  # Allow manual trigger

jobs:
  generate-report:
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
      
      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.11'
      
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install yfinance requests
      
      - name: Generate report
        run: |
          python backend/report_generator.py
      
      - name: Commit and push report
        run: |
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          git config --global user.name "GitHub Actions"
          
          # Check if there are changes to commit
          if [ -n "$(git status --porcelain)" ]; then
            git add docs/report.html
            git commit -m "chore(report): update weekly WTR/TTR report"
            git push
            echo "REPORT_PUSHED=true" >> $GITHUB_ENV
          else
            echo "REPORT_PUSHED=false" >> $GITHUB_ENV
          fi
      
      - name: Send to Telegram
        if: env.REPORT_PUSHED == 'true'
        run: |
          python << 'EOF'
          import requests
          from pathlib import Path
          import json
          
          bot_token = "${{ secrets.TELEGRAM_BOT_TOKEN }}"
          chat_id = "${{ secrets.TELEGRAM_CHAT_ID }}"
          
          # Read metrics to create message
          data_dir = Path("data")
          try:
              with open(data_dir / "wtr_history.json") as f:
                  wtr = json.load(f)
              with open(data_dir / "ttr_history.json") as f:
                  ttr = json.load(f)
          except:
              wtr = {}
              ttr = {}
          
          # Build message
          days = ["Monday", "Tuesday", "Wednesday", "Thursday", "Friday"]
          wtr_text = "\n".join([f"  {day}: {wtr.get(day, 'N/A')}%" for day in days])
          ttr_text = "\n".join([f"  {day}: {ttr.get(day, 'N/A')}%" for day in days])
          
          message = f"""📊 *SPX WTR/TTR Weekly Report*

📈 *Weekly Triumph Rate (WTR)*
{wtr_text}

⏭️ *Tomorrow's Triumph Rate (TTR)*
{ttr_text}

📊 *Full Report*:
https://xrichini.github.io/alphacrunching/report.html"""
          
          # Send Telegram message
          url = f"https://api.telegram.org/bot{bot_token}/sendMessage"
          payload = {
              "chat_id": chat_id,
              "text": message,
              "parse_mode": "Markdown"
          }
          
          response = requests.post(url, json=payload)
          if response.status_code == 200:
              print("✅ Message sent to Telegram")
          else:
              print(f"❌ Failed to send message: {response.status_code}")
          EOF
      
      - name: Report status
        if: always()
        run: |
          echo "✅ Workflow completed"
          echo "Report URL: https://xrichini.github.io/alphacrunching/report.html"
